<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Modal RAG System</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>PDF Question Answering System</h1>
        
        <!-- PDF Upload Section -->
        <div class="upload-section">
            <h2>1. Upload PDF</h2>
            <form id="uploadForm" class="upload-form">
                <input type="file" id="pdfFile" accept=".pdf" required>
                <button type="submit">Upload PDF</button>
            </form>
            <div id="uploadStatus"></div>
        </div>

        <!-- Query Section -->
        <div class="query-section">
            <h2>2. Ask a Question</h2>
            <form id="queryForm" class="query-form">
                <textarea id="prompt" placeholder="Enter your question here..." required></textarea>
                <button type="submit">Ask Question</button>
            </form>
        </div>

        <!-- Response Section -->
        <div class="response-section">
            <h2>Response</h2>
            <div id="response" class="response-box"></div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('pdfFile').files[0];
            const formData = new FormData();
            formData.append('file', file);

            const uploadStatus = document.getElementById('uploadStatus');
            uploadStatus.textContent = 'Uploading and processing PDF...';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                uploadStatus.textContent = result.message;
            } catch (error) {
                uploadStatus.textContent = 'Error processing PDF: ' + error.message;
            }
        });

        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('prompt').value;
            const formData = new FormData();
            formData.append('prompt', prompt);

            const responseDiv = document.getElementById('response');
            responseDiv.textContent = 'Processing query...';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                responseDiv.textContent = result.response || result.error;
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
