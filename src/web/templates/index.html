<!DOCTYPE html>
<html>
<head>
    <title>PDF RAG Application</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>PDF RAG Application</h1>
        
        <!-- Upload Section -->
        <div class="section upload-section">
            <h2>Upload PDF</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="input-group">
                    <input type="file" id="pdfFile" name="file" accept=".pdf" required>
                    <button type="submit">Upload</button>
                </div>
            </form>
            <div id="uploadStatus" class="status"></div>
        </div>

        <!-- Query Section -->
        <div class="section query-section">
            <h2>Ask Questions</h2>
            <form id="queryForm">
                <div class="input-group">
                    <textarea id="queryInput" name="prompt" placeholder="Ask your question here..." required></textarea>
                    <button type="submit">Ask</button>
                </div>
            </form>
            <div id="queryResult" class="result-box"></div>
        </div>
    </div>

    <!-- Add JavaScript -->
    <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
